<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeli Intel Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #07090c;
    --surface: #0c0f14;
    --surface2: #111520;
    --border: #191f2a;
    --accent: #00d4ff;
    --green: #00e676;
    --green-dim: #00e67622;
    --blue: #3b82f6;
    --blue-dim: #3b82f618;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --coral: #ff6b6b;
    --muted: #2a3442;
    --text: #d8e4f0;
    --text-dim: #5a6a7a;
    --text-muted: #2a3a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* ── NAV ── */
  .zeli-nav {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    padding: 14px 0;
    margin-right: 20px;
  }
  .nav-link {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    padding: 14px 12px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .nav-link:hover { color: var(--text); }
  .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── LOGIN ── */
  .login-wrap {
    min-height: calc(100vh - 45px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px;
    width: 100%;
    max-width: 340px;
  }
  .login-title { font-size: 18px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .login-sub { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim); margin-bottom: 24px; letter-spacing: 1px; }
  .login-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'Space Mono', monospace; font-size: 13px;
    padding: 11px 14px; border-radius: 2px; margin-bottom: 10px; outline: none;
    transition: border-color 0.15s;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-submit {
    width: 100%; padding: 11px; background: transparent;
    border: 1px solid var(--green); color: var(--green);
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    border-radius: 2px; cursor: pointer; transition: background 0.15s;
  }
  .login-submit:hover { background: var(--green-dim); }
  .login-err { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--red); margin-top: 10px; display: none; }

  /* ── MAIN WRAPPER ── */
  .wrapper { max-width: 1100px; margin: 0 auto; padding: 32px 20px 64px; }

  /* ── HEADER ── */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .page-header h1 { font-size: clamp(22px, 4vw, 38px); font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .page-header h1 em { font-style: normal; color: var(--accent); }
  .page-header p { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 6px; }

  .run-group { display: flex; gap: 8px; flex-wrap: wrap; }

  .run-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 16px;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; border-radius: 3px;
    transition: opacity 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .run-btn .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .run-btn.pulse .dot { animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  .btn-all   { border: 1px solid var(--green);  color: var(--green);  background: transparent; }
  .btn-all:not(:disabled):hover { background: var(--green-dim); }
  .btn-all .dot   { background: var(--green); }

  .btn-strat { border: 1px solid var(--blue);   color: var(--blue);   background: transparent; }
  .btn-strat:not(:disabled):hover { background: var(--blue-dim); }
  .btn-strat .dot { background: var(--blue); }

  .btn-re    { border: 1px solid var(--coral);  color: var(--coral);  background: transparent; }
  .btn-re:not(:disabled):hover { background: #ff6b6b18; }
  .btn-re .dot    { background: var(--coral); }

  /* ── PROGRESS ── */
  .progress-wrap { margin-bottom: 24px; display: none; }
  .progress-wrap.on { display: block; }
  .progress-bar { height: 1px; background: var(--muted); border-radius: 1px; overflow: hidden; margin-bottom: 8px; }
  .progress-fill { height: 100%; background: var(--green); transition: width 0.35s ease; width: 0%; }
  .progress-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── TRACKS GRID ── */
  .tracks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 8px;
    margin-bottom: 32px;
  }

  /* ── TRACK CARD ── */
  .track-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .track-card.running { border-color: #3b82f655; }
  .track-card.done    { border-color: #00e67640; }
  .track-card.err     { border-color: #ef444440; }

  .track-top {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 14px 12px;
    cursor: pointer;
    user-select: none;
  }

  .track-icon {
    width: 34px; height: 34px; border-radius: 4px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; background: var(--surface2); border: 1px solid var(--border);
  }

  .track-info { flex: 1; min-width: 0; }
  .track-name { font-size: 13px; font-weight: 700; line-height: 1.2; }
  .track-desc { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-dim); margin-top: 2px; line-height: 1.4; }

  .track-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); transition: background 0.2s; }
  .status-dot.running { background: var(--blue); animation: blink 1s ease-in-out infinite; }
  .status-dot.done    { background: var(--green); }
  .status-dot.err     { background: var(--red); animation: none; }

  .cat-badge {
    font-family: 'Space Mono', monospace;
    font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
    padding: 2px 6px; border-radius: 10px;
  }
  .cat-strat { background: var(--blue-dim); color: var(--blue); }
  .cat-re    { background: #ff6b6b15; color: var(--coral); }

  .run-track-btn {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 2px; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--text-dim);
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .run-track-btn:hover { border-color: var(--accent); color: var(--accent); }
  .run-track-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .collapse-arrow {
    font-size: 14px; color: var(--text-muted); transition: transform 0.2s;
    font-family: 'Space Mono', monospace; line-height: 1;
  }
  .track-card.open .collapse-arrow { transform: rotate(90deg); }

  /* ── CARD BODY ── */
  .track-body {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }
  .track-card.open .track-body { display: block; }

  .track-status-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--text-muted); padding-top: 10px;
  }
  .track-card.running .track-status-text { color: var(--blue); }
  .track-card.done    .track-status-text { color: var(--green); }
  .track-card.err     .track-status-text { color: var(--red); }

  .track-result { margin-top: 10px; }

  .findings-text {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--text-dim); line-height: 1.75; margin-bottom: 10px;
  }

  .insight-box {
    background: var(--surface2); border-left: 2px solid var(--green);
    padding: 9px 11px; border-radius: 0 3px 3px 0; margin-bottom: 8px;
  }
  .insight-box.blue { border-left-color: var(--blue); }
  .insight-box.coral { border-left-color: var(--coral); }
  .insight-box.purple { border-left-color: var(--purple); }

  .insight-label {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--green); margin-bottom: 4px;
  }
  .insight-label.blue { color: var(--blue); }
  .insight-label.coral { color: var(--coral); }
  .insight-label.purple { color: var(--purple); }

  .insight-text { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text); line-height: 1.6; }

  .urgency-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .urgency-pill {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 1px; text-transform: uppercase; padding: 3px 7px; border-radius: 2px;
  }
  .pill-high { background: #ef444420; color: #f87171; }
  .pill-med  { background: #f59e0b18; color: var(--amber); }
  .pill-low  { background: #00e67618; color: var(--green); }
  .pill-ex   { background: var(--blue-dim); color: var(--blue); }

  .urgency-reason { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim); }

  .track-ts { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); margin-top: 10px; }

  /* verticals */
  .vertical-item { margin-top: 8px; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; }
  .vertical-name { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .vertical-desc { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim); line-height: 1.5; margin-bottom: 6px; }
  .vertical-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .vmeta { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim); line-height: 1.5; }
  .vmeta-label { color: var(--text-muted); font-size: 9px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 1px; }

  /* ── SYNTHESIS ── */
  .synth-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .synth-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); }
  .synth-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 18px; border: 1px solid var(--purple); color: var(--purple);
    background: transparent; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    border-radius: 3px; cursor: pointer; transition: background 0.15s;
    white-space: nowrap;
  }
  .synth-btn:hover:not(:disabled) { background: #a78bfa15; }
  .synth-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .synth-btn .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--purple); flex-shrink: 0; }
  .synth-btn.pulse .dot { animation: blink 1s ease-in-out infinite; }

  .synth-body {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
  }
  .synth-body.on { display: block; }
  .synth-summary { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim); line-height: 1.75; margin-bottom: 20px; padding: 14px; background: var(--surface2); border-radius: 3px; border-left: 2px solid var(--purple); }
  .synth-ts { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); margin-top: 16px; text-align: right; }

  /* ── AD CARDS ── */
  .ad-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 18px; margin-bottom: 12px;
  }
  .ad-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .ad-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .ad-sources {
    font-family: 'Space Mono', monospace; font-size: 9px;
    color: var(--purple); letter-spacing: 1px;
  }
  .ad-angle {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--text-dim); line-height: 1.6; margin-bottom: 12px;
    padding: 8px 10px; background: #a78bfa10; border-radius: 2px;
    border-left: 2px solid var(--purple);
  }
  .ad-copy-wrap {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 3px; padding: 14px; margin-bottom: 12px; position: relative;
  }
  .ad-copy-label {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 8px;
  }
  .ad-copy-text {
    font-family: 'Space Mono', monospace; font-size: 12px;
    color: var(--text); line-height: 1.75; white-space: pre-wrap;
    margin-bottom: 10px;
  }
  .copy-btn {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    padding: 5px 12px; border-radius: 2px; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--text-dim);
    transition: border-color 0.15s, color 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .ad-meta-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px;
  }
  .ad-meta-item {
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim); line-height: 1.5;
  }
  .meta-label {
    display: block; font-size: 9px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-muted); margin-bottom: 2px;
  }
  .ad-targeting {
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim);
    line-height: 1.5; padding: 8px 10px; background: #3b82f60a;
    border-radius: 2px; border-left: 2px solid var(--blue);
  }
  @media (max-width: 600px) { .ad-meta-grid { grid-template-columns: 1fr; } }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .tracks-grid { grid-template-columns: 1fr; }
    .wrapper { padding: 20px 14px 48px; }
    .vertical-meta { grid-template-columns: 1fr; }
    .run-group { gap: 6px; }
    .run-btn { padding: 8px 12px; font-size: 11px; }
    .page-header { padding-bottom: 16px; margin-bottom: 20px; }
  }
</style>
</head>
<body>

<nav class="zeli-nav">
  <a class="nav-logo" href="/">Zeli</a>
  <a class="nav-link" href="/dashboard?key=autoparts0">Dashboard</a>
  <a class="nav-link active" href="/intel">Intel</a>
  <a class="nav-link" href="/search?key=autoparts0">Catalogue</a>
  <a class="nav-link" href="/conversations">Convos</a>
</nav>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="login-title">Zeli Intel</div>
    <div class="login-sub">13 tracks · Strategy + Real Estate · Panama</div>
    <input type="password" class="login-input" id="pwInput" placeholder="Password" />
    <button class="login-submit" id="loginBtn">Access →</button>
    <div class="login-err" id="loginErr">Incorrect password</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">
<div class="wrapper">

  <div class="page-header">
    <div>
      <h1>Zeli <em>Intel</em></h1>
      <p>13 tracks · Strategy + Real Estate · March 2026</p>
    </div>
    <div class="run-group">
      <button class="run-btn btn-all"   id="btnAll"   onclick="runAll()"><span class="dot"></span> Run All (13)</button>
      <button class="run-btn btn-strat" id="btnStrat" onclick="runGroup(STRATEGY_IDS,'Strategy')"><span class="dot"></span> Strategy (8)</button>
      <button class="run-btn btn-re"    id="btnRE"    onclick="runGroup(RE_IDS,'RE')"><span class="dot"></span> Real Estate (5)</button>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel"></div>
  </div>

  <div class="section-title">Strategy Tracks</div>
  <div class="tracks-grid" id="stratGrid"></div>

  <div class="section-title">Real Estate Intelligence</div>
  <div class="tracks-grid" id="reGrid"></div>

  <div class="synth-header">
    <div class="synth-label">Strategic Synthesis</div>
    <button class="synth-btn" id="synthBtn" onclick="runSynthesis()"><span class="dot"></span> Run Synthesis</button>
  </div>
  <div class="synth-body" id="synthBody">
    <div class="synth-text" id="synthText"></div>
    <div class="synth-ts"  id="synthTs"></div>
  </div>

</div>
</div>

<script>
/* ─────────────────────────────────────────────────────────────
   TRACK DEFINITIONS
───────────────────────────────────────────────────────────── */

const STRATEGY_IDS = ['whatsapp','panama_re','fintech','autoparts','aitools','panama_smb','logistics','verticals'];
const RE_IDS       = ['miviot','mortgage','competing','santiago_dev','construction'];

const TRACKS = {
  /* ── STRATEGY ── */
  whatsapp: {
    name: 'WhatsApp & Meta API',
    desc: 'Platform changes that affect the bot',
    icon: '💬', cat: 'strategy',
    prompt: `Search for the latest WhatsApp Business API updates, Meta messaging policy changes, and new WhatsApp Business Platform features as of March 2026. Focus on: new message template rules, 24-hour window changes, webhook updates, pricing changes, and any new bot capabilities released in the last 30-60 days. Use web search to find the latest information.`
  },
  panama_re: {
    name: 'Panama Real Estate Market',
    desc: 'General market trends, prices, volumes',
    icon: '🏘️', cat: 'strategy',
    prompt: `Search for current Panama real estate market trends in March 2026, specifically in Veraguas province and Santiago Panama. Look for: property price movements, buyer demand signals, new development projects, and foreign investment trends in these regions. Use web search to find the latest information.`
  },
  fintech: {
    name: 'LatAm Fintech & MFI Funding',
    desc: 'Who is raising, what narrative works',
    icon: '📈', cat: 'strategy',
    prompt: `Search for recent Latin America fintech funding rounds and microfinance institution news in early 2026. Focus on: which fintech companies are raising capital, what narratives work with investors (credit scoring, SMB lending, WhatsApp-native apps), any Panama or Central America fintech developments, and IFC or IDB investment activity. Use web search to find the latest information.`
  },
  autoparts: {
    name: 'Auto Parts Market Signals',
    desc: 'Demand signals & competitor moves',
    icon: '🔩', cat: 'strategy',
    prompt: `Search for Panama auto parts market news in 2026. Look for: vehicle import statistics to Panama, auto parts import/export data, any new competitors or WhatsApp-based auto parts businesses in Panama, distributor news in Panama City, and demand signals for auto parts in the interior provinces (Veraguas, Chiriquí). Use web search to find the latest information.`
  },
  aitools: {
    name: 'Agentic AI Tooling',
    desc: "New capabilities to drop into Zeli's stack",
    icon: '🤖', cat: 'strategy',
    prompt: `Search for the latest agentic AI developments and tools in early 2026 relevant to WhatsApp bots, automated lead generation, web scraping agents, and AI-powered business automation for SMBs in emerging markets. Focus on new Claude, OpenAI, or open-source capabilities and new WhatsApp AI integrations released in the last 60 days. Use web search to find the latest information.`
  },
  panama_smb: {
    name: 'Panama SMB Economy',
    desc: 'Business climate & credit access',
    icon: '🇵🇦', cat: 'strategy',
    prompt: `Search for Panama economic news and small business conditions in early 2026. Look for: GDP growth or slowdown signals, small business credit access, consumer spending in interior provinces, government SMB programs, Panama Canal traffic as economic indicator, and inflation affecting small businesses. Use web search to find the latest information.`
  },
  logistics: {
    name: 'Panama Logistics & Trade',
    desc: 'Canal, Zona Libre, freight shifts',
    icon: '🚢', cat: 'strategy',
    prompt: `Search for Panama logistics, shipping, and trade news in early 2026. Focus on: Panama Canal traffic and tonnage trends, Zona Libre de Colón activity, last-mile delivery companies in Panama's interior provinces, new freight routes or logistics startups in Central America, and how global supply chain shifts affect Panama's strategic trade position. Use web search to find the latest information.`
  },
  verticals: {
    name: 'Untapped Vertical Opportunities',

/* ─────────────────────────────────────────────────────────────
   CLAUDE API
───────────────────────────────────────────────────────────── */

function safeJsonParse(text) {
  // Strip markdown fences Claude sometimes wraps JSON in
  let c = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  // Escape control characters inside JSON string values rather than stripping
  c = c.replace(/[\x00-\x1F\x7F]/g, ch => {
    if (ch === '\n') return '\\n';
    if (ch === '\r') return '\\r';
    if (ch === '\t') return '\\t';
    return '';
  });
  return JSON.parse(c);
}

async function callClaude(systemPrompt, userPrompt, opts = {}) {
  const { model = 'claude-haiku-4-5-20251001', useSearch = true, onRetry } = opts;
  const payload = {
    model,
    max_tokens: 2048,
    system: systemPrompt,
    messages: [{ role: 'user', content: userPrompt }],
    password: pw
  };
  if (useSearch) payload.tools = [{ type: 'web_search_20250305', name: 'web_search' }];

  for (let attempt = 0; attempt < 3; attempt++) {
    if (attempt > 0) {
      const waitSecs = attempt * 30;      // 30s first retry, 60s second
      if (onRetry) onRetry(waitSecs);
      await delay(waitSecs * 1000);
    }

    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (res.status === 401) { showLogin(); throw new Error('Authentication required'); }
    if (res.status === 429) {
      if (attempt < 2) continue;
      throw new Error('Rate limit — retried 3x, try again later');
    }

    const rawText = await res.text();
    let data;
    try { data = safeJsonParse(rawText); } catch { throw new Error('Invalid response from server'); }

    if (!res.ok || data.error) throw new Error(data?.error?.message || `HTTP ${res.status}`);
    return data.content.filter(b => b.type === 'text').map(b => b.text).join('');
  }
}

/* ─────────────────────────────────────────────────────────────
   PARSE HELPERS
───────────────────────────────────────────────────────────── */

function field(text, label) {
  const m = text.match(new RegExp(label + ':\\s*([\\s\\S]*?)(?=\\n[A-Z_]+:|$)'));
  return (m?.[1] || '').replace(/\*\*/g, '').trim();
}

function parseStandard(text) {
  return {
    findings: field(text, 'FINDINGS'),
    insight:  field(text, 'ZELI_INSIGHT'),
    urgency:  text.match(/URGENCY:\s*(HIGH|MEDIUM|LOW)/)?.[1] || 'MEDIUM',
    reason:   field(text, 'REASON'),
  };
}

function parseRE(text) {
  return {
    findings:   field(text, 'FINDINGS'),
    insight:    field(text, 'ZELI_INSIGHT'),
    urgency:    text.match(/URGENCY:\s*(HIGH|MEDIUM|LOW)/)?.[1] || 'MEDIUM',
    reason:     field(text, 'REASON'),
    adAngle:    field(text, 'SUGGESTED AD ANGLE'),
    targeting:  field(text, 'TARGETING SUGGESTION'),
  };
}

function parseVerticals(text) {
  const verticals = [];
  for (let i = 1; i <= 3; i++) {
    const m = text.match(new RegExp(`VERTICAL_${i}:\\s*([\\s\\S]*?)(?=VERTICAL_${i+1}:|ZELI_INSIGHT:|$)`));
    if (m) {
      const p = m[1].trim().split('|').map(s => s.trim());
      verticals.push({ name: p[0]||'', desc: p[1]||'', advantage: p[2]||'', repeat: p[3]||'', margin: p[4]||'', risk: p[5]||'' });
    }
  }
  return {
    findings: field(text, 'FINDINGS'),
    insight:  field(text, 'ZELI_INSIGHT'),
    urgency:  'EXPLORE',
    reason:   field(text, 'REASON'),
    verticals,
  };
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

async function runTrack(id, fromBatch = false) {
  const t    = TRACKS[id];
  const card = document.getElementById(`card-${id}`);
  const dot  = document.getElementById(`dot-${id}`);
  const btn  = document.getElementById(`btn-${id}`);
  const st   = document.getElementById(`status-${id}`);
  const res  = document.getElementById(`result-${id}`);
  const ts   = document.getElementById(`ts-${id}`);

  // Set running state
  card.className = 'track-card open running';
  dot.className  = 'status-dot running';
  btn.disabled   = true;
  st.textContent = 'Scanning…';
  res.innerHTML  = '';
  ts.textContent = '';

  const sys = t.isVerticals ? SYS_VERTICALS : (t.cat === 're' ? SYS_RE : SYS_STANDARD);

  try {
    const raw = await callClaude(sys, t.prompt, {
      onRetry: (secs) => { st.textContent = `Rate limited — retrying in ${secs}s…`; }
    });
    const parsed = t.isVerticals ? parseVerticals(raw) : (t.cat === 're' ? parseRE(raw) : parseStandard(raw));

    trackResults[id] = parsed;
    renderResults(id, parsed);

    card.className = 'track-card open done';
    dot.className  = 'status-dot done';
    st.textContent = 'Complete';
    ts.textContent = 'Ran ' + new Date().toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit', hour12: false });
  } catch(e) {
    trackResults[id] = null;
    card.className = 'track-card open err';
    dot.className  = 'status-dot err';
    st.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }

  if (fromBatch) {
    _batchDone++;
    updateProgress();
  }
}

/* ─────────────────────────────────────────────────────────────
   BATCH RUNNERS
───────────────────────────────────────────────────────────── */

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runGroup(ids, label) {
  _batchTotal = ids.length;
  _batchDone  = 0;

  // Disable batch buttons while running
  ['btnAll','btnStrat','btnRE'].forEach(b => {
    const el = document.getElementById(b);
    el.disabled = true;
    el.classList.add('pulse');
  });

  const wrap = document.getElementById('progressWrap');
  wrap.classList.add('on');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressLabel').textContent = `0 / ${ids.length} ${label} tracks complete`;

  // Stagger launches 500ms apart, run concurrently
  const promises = ids.map((id, i) =>
    delay(i * 3000).then(() => runTrack(id, true))  // 3s stagger to stay under rate limits
  );
  await Promise.allSettled(promises);

  // Re-enable buttons
  ['btnAll','btnStrat','btnRE'].forEach(b => {
    const el = document.getElementById(b);
    el.disabled = false;
    el.classList.remove('pulse');
  });
}

function runAll()      { runGroup([...STRATEGY_IDS, ...RE_IDS], 'total'); }
function runStrategy() { runGroup(STRATEGY_IDS, 'strategy'); }
function runRE()       { runGroup(RE_IDS, 're'); }

function updateProgress() {
  const pct = _batchTotal > 0 ? Math.round(_batchDone / _batchTotal * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${_batchDone} / ${_batchTotal} tracks complete`;
}

          ${ad.angle ? `<div class="ad-angle">${esc(ad.angle)}</div>` : ''}
          <div class="ad-copy-wrap">
            <div class="ad-copy-label">Primary text</div>
            <div class="ad-copy-text" id="${copyId}">${esc(ad.primary_text || '')}</div>
            <button class="copy-btn" onclick="copyAdText('${copyId}', this)">Copy</button>
          </div>
          <div class="ad-meta-grid">
            ${ad.headline ? `<div class="ad-meta-item"><span class="meta-label">Headline</span>${esc(ad.headline)}</div>` : ''}
            ${ad.cta ? `<div class="ad-meta-item"><span class="meta-label">CTA</span>${esc(ad.cta)}</div>` : ''}
            ${ad.targeting?.age_range ? `<div class="ad-meta-item"><span class="meta-label">Age</span>${esc(ad.targeting.age_range)}</div>` : ''}
            ${ad.budget_suggestion ? `<div class="ad-meta-item"><span class="meta-label">Budget</span>${esc(ad.budget_suggestion)}</div>` : ''}
          </div>
          ${(ad.targeting?.location || interests || ad.targeting?.why) ? `
          <div class="ad-targeting">
            <span class="meta-label">Targeting</span>
            ${ad.targeting?.location ? esc(ad.targeting.location) : ''}
            ${interests ? ` &nbsp;·&nbsp; ${esc(interests)}` : ''}
            ${ad.targeting?.why ? `<br>${esc(ad.targeting.why)}` : ''}
          </div>` : ''}
        </div>`;
    });

    text.innerHTML = html;
    ts.textContent = 'Generated ' + new Date().toLocaleString('en', { dateStyle: 'medium', timeStyle: 'short' });
  } catch(e) {
    text.innerHTML = `<div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--red)">Synthesis failed: ${esc(e.message)}</div>`;
  }

  btn.disabled = false;
  btn.classList.remove('pulse');
}

function copyAdText(elId, btn) {
  const text = document.getElementById(elId)?.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    btn.textContent = 'Copy failed';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  });
}
</script>
</body>
</html>
